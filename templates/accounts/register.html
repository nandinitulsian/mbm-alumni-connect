{% extends 'base.html' %}

{% block title %}Join UniversityHub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">MBM Alumni Connect</div>
        <div class="auth-tagline">Connect with your university community</div>
        <div class="auth-title">Join as</div>

        <div class="role-cards">
            <a href="{% url 'register_student' %}" class="role-card">
                <div class="role-card-icon">🎓</div>
                <div class="role-card-title">Student</div>
                <div class="role-card-desc">Currently studying at the university</div>
            </a>
            <a href="{% url 'register_alumni' %}" class="role-card">
                <div class="role-card-icon">💼</div>
                <div class="role-card-title">Alumni</div>
                <div class="role-card-desc">Graduated and working in industry</div>
            </a>
        </div>

        <div class="auth-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
